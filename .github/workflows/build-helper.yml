name: Build ClipTap Helper

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-helper:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build standalone helper
        shell: pwsh
        run: .\helper\build-standalone.ps1

      - name: Upload helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipTapHelper
          path: dist/ClipTapHelper.exe
