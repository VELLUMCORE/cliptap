<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClipTap</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <header>
      <strong>ClipTap</strong>
      <span id="helperStatus">Checking</span>
    </header>

    <section class="video-box">
      <div id="videoTitle">Open this on a YouTube video page.</div>
      <div class="time-row">
        <span>Current</span>
        <b id="currentTime">00:00:00</b>
      </div>
    </section>

    <section class="grid">
      <label>
        Start
        <input id="startInput" placeholder="00:01:20" />
      </label>
      <button id="setStartBtn" type="button">Use Current as Start</button>
      <label>
        End
        <input id="endInput" placeholder="00:02:45" />
      </label>
      <button id="setEndBtn" type="button">Use Current as End</button>
    </section>

    <section class="options">
      <label>
        Quality
        <select id="qualitySelect">
          <option value="best">Best</option>
          <option value="1080">Up to 1080p</option>
          <option value="720">Up to 720p</option>
          <option value="audio">Audio MP3</option>
        </select>
      </label>
      <label>
        Cookies
        <select id="cookieSelect">
          <option value="">None</option>
          <option value="edge">Edge</option>
          <option value="chrome">Chrome</option>
          <option value="firefox">Firefox</option>
        </select>
      </label>
      <label class="checkline">
        <input id="forceKeyframes" type="checkbox" />
        Use precise cuts
      </label>
    </section>

    <section class="actions">
      <button id="downloadBtn" type="button" class="primary">Download Section</button>
      <button id="fullDownloadBtn" type="button">Download Full Video</button>
      <button id="copyBtn" type="button">Copy Section Command</button>
    </section>

    <p id="message" role="status"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
